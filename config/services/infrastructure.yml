services:
  # IFSC API Client
  SportClimbing\IfscCalendar\Infrastructure\IFSC\IFSCApiClientFactory:
    class: SportClimbing\IfscCalendar\Infrastructure\IFSC\IFSCApiClientFactory
    arguments:
      - '@SportClimbing\IfscCalendar\Infrastructure\HttpClient\HttpGuzzleClient'
      - '@SportClimbing\IfscCalendar\Infrastructure\IFSC\IFSCApiClientAuthenticator'

  SportClimbing\IfscCalendar\Infrastructure\IFSC\IFSCApiClient:
    factory: '@SportClimbing\IfscCalendar\Infrastructure\IFSC\IFSCApiClientFactory'

  SportClimbing\IfscCalendar\Infrastructure\IFSC\IFSCApiClientAuthenticator:
    arguments:
      - '@SportClimbing\IfscCalendar\Infrastructure\HttpClient\HttpGuzzleClient'

  # Domain Event
  SportClimbing\IfscCalendar\Infrastructure\DomainEvent\SymfonyEventDispatcher:
    class: SportClimbing\IfscCalendar\Infrastructure\DomainEvent\SymfonyEventDispatcher
    autowire: true

  # Calendar
  SportClimbing\IfscCalendar\Infrastructure\Calendar\JsonCalendar: ~

  SportClimbing\IfscCalendar\Infrastructure\Calendar\ICalCalendar:
    class: SportClimbing\IfscCalendar\Infrastructure\Calendar\ICalCalendar
    arguments:
      - '@SportClimbing\IfscCalendar\Infrastructure\Calendar\CalendarFactory'
      - '%calendar_product_identifier%'
      - '%calendar_published_ttl%'
      - '%calendar_name%'

  SportClimbing\IfscCalendar\Infrastructure\Calendar\CalendarFactory: ~

  # Start List
  SportClimbing\IfscCalendar\Infrastructure\StartList\ApiStartListProvider:
    class: SportClimbing\IfscCalendar\Infrastructure\StartList\ApiStartListProvider
    arguments:
      - '@SportClimbing\IfscCalendar\Infrastructure\IFSC\IFSCApiClient'

  # Athlete
  SportClimbing\IfscCalendar\Infrastructure\Athlete\IFSCApiAthleteProvider:
    class: SportClimbing\IfscCalendar\Infrastructure\Athlete\IFSCApiAthleteProvider
    arguments:
      - '@SportClimbing\IfscCalendar\Infrastructure\IFSC\IFSCApiClient'

  SportClimbing\IfscCalendar\Infrastructure\Athlete\CachedAthleteProvider:
    class: SportClimbing\IfscCalendar\Infrastructure\Athlete\CachedAthleteProvider
    arguments:
      - '@SportClimbing\IfscCalendar\Infrastructure\Athlete\IFSCApiAthleteProvider'
      - '@ifsc.athlete.cache'
      - '%ifsc_athlete_cache_ttl_seconds%'

  SportClimbing\IfscCalendar\Infrastructure\Athlete\InstagramHandleOverrides:
    class: SportClimbing\IfscCalendar\Infrastructure\Athlete\InstagramHandleOverrides
    arguments:
      - '%instagram_handles%'

  SportClimbing\IfscCalendar\Infrastructure\Athlete\InstagramEnrichedAthleteProvider:
    class: SportClimbing\IfscCalendar\Infrastructure\Athlete\InstagramEnrichedAthleteProvider
    arguments:
      - '@SportClimbing\IfscCalendar\Infrastructure\Athlete\CachedAthleteProvider'
      - '@SportClimbing\IfscCalendar\Infrastructure\Athlete\InstagramHandleOverrides'

  # YouTube
  SportClimbing\IfscCalendar\Infrastructure\YouTube\YouTubeVideoProvider:
    class: SportClimbing\IfscCalendar\Infrastructure\YouTube\YouTubeVideoProvider
    arguments:
      - '@nicoSWD\IfscVideos\Domain\YouTube\YouTubeVideoCollection'

  nicoSWD\IfscVideos\Infrastructure\YouTube\YouTubeVideoProvider: ~

  # HTTP Client
  SportClimbing\IfscCalendar\Infrastructure\HttpClient\HttpGuzzleClient:
    class: SportClimbing\IfscCalendar\Infrastructure\HttpClient\HttpGuzzleClient
    arguments:
      - '@GuzzleHttp\Client'
      - '@SportClimbing\IfscCalendar\Infrastructure\DomainEvent\SymfonyEventDispatcher'

  # Vendor services
  ifsc.athlete.cache:
    class: Symfony\Component\Cache\Adapter\FilesystemAdapter
    arguments:
      - 'ifsc_athlete'
      - 0

  nicoSWD\IfscVideos\Domain\YouTube\YouTubeVideoCollection:
    class: nicoSWD\IfscVideos\Domain\YouTube\YouTubeVideoCollection
    arguments:
      - '@nicoSWD\IfscVideos\Infrastructure\YouTube\YouTubeVideoProvider'

  Symfony\Component\EventDispatcher\EventDispatcher: ~
  Symfony\Component\Filesystem\Filesystem: ~
  GuzzleHttp\Client: ~
